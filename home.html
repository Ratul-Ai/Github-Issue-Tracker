<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github-Issue-Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!--/ fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!--/ custom Css  -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }

    </style>
    <!--/ daisy+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--/ font awesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <header class="sticky top-0 z-10">
      <div class="navbar bg-base-100 shadow-sm gap-8">
        <div class="w-11/12 mx-auto flex justify-between items-center">
        <div class="flex-1">
          <a class="flex flex-col justify-center sm:justify-start sm:flex-row sm:items-center gap-1"
            ><i class="sm:text-2xl fa-brands fa-github"></i>
            <span class="text-sm sm:text-xl">GitHub Issue Tracker</span>
          </a>
        </div>
        <div class="flex gap-2">
          <label class="input input-bordered flex items-center gap-2">
            <i class="fa-solid fa-search text-gray-400"></i>
            <input type="text" placeholder="Search issues..." class="grow" />
          </label>

          <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> <span class="hidden sm:block">New Issue</span></button>
        </div>
      </div>
    </div>
    </header>
    <section class="w-3/4 mx-auto">
        
<div class=" mt-15 p-6 bg-base-200 shadow-sm flex flex-col gap-3 sm:flex-row">
    <button class="btn btn-primary btn-outline px-9">All</button>
    <button class="btn btn-primary btn-outline px-7">Open</button>
    <button class="btn btn-primary btn-outline px-5">Closed</button>
    
 
</div>
    </section>
  </body>
</html>
